name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t sfps:ci .
      - name: Smoke test — dry-run a fake recording through the pipeline
        run: |
          mkdir -p watchdir
          head -c 1024 /dev/zero > "watchdir/EPL Arsenal vs Chelsea 2026-07-12.ts"
          docker run --rm \
            -e GEMINI_API_KEY=ci-smoke-test \
            -v "$PWD/watchdir:/watch" \
            sfps:ci process "/watch/EPL Arsenal vs Chelsea 2026-07-12.ts" --dry-run

  # Publish a rolling :latest image to GHCR on every commit to main
  # (no version tags — unRAID pulls ghcr.io/jamesgallagher/spoilerfreeplexsports:latest)
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/jamesgallagher/spoilerfreeplexsports:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
